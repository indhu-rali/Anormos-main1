<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Anormos</title>
<script>
  // GitHub Pages 404 fix — redirect to correct page
  // e.g. /Anormos-main1/about.html -> finds the right file
  const path = window.location.pathname;
  const repoBase = '/Anormos-main1/';
  const file = path.replace(repoBase, '');
  if(file && file !== '404.html'){
    // already at correct url, just show 404
  }
</script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Helvetica Neue',Arial,sans-serif;background:#0a0a0c;color:#fff;
    display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px;}
  .logo{font-size:32px;font-weight:800;margin-bottom:40px;display:block;color:#fff;text-decoration:none;}
  h1{font-size:clamp(60px,12vw,140px);font-weight:800;line-height:1;
    background:linear-gradient(135deg,#a64bff,#ff4bd8,#4b8cff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  p{color:#8a8a8f;margin:24px 0 40px;font-size:18px;}
  a.btn{display:inline-flex;align-items:center;background:#fff;color:#0a0a0c;
    border-radius:99px;padding:16px 32px;font-weight:700;font-size:15px;
    text-decoration:none;gap:8px;transition:opacity .2s;}
  a.btn:hover{opacity:.85;}
</style>
</head>
<body>
  <div>
    <a href="/Anormos-main1/" class="logo">Anormos</a>
    <h1>404</h1>
    <p>This page doesn't exist — or hasn't loaded yet.</p>
    <a class="btn" href="/Anormos-main1/">← Back to Homepage</a>
  </div>
</body>
</html>
